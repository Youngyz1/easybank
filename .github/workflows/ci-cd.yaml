name: EasyBank CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
  TF_VAR_slack_webhook_url: ${{ secrets.TF_VAR_SLACK_WEBHOOK_URL }}
  ECR_REPO_NAME: easybank

jobs:
# ============================================================
# JOB 1: PROVISION INFRASTRUCTURE
# ============================================================
  terraform-base:
    name: Provision Base Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: easybank-infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init / Validate / Apply
        run: |
          terraform init -input=false
          terraform validate
          terraform apply -auto-approve

      - name: Notify Slack - Infrastructure
        if: always()
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          message: |
            *EasyBank Infrastructure Provisioning*
            Status: ${{ job.status }}
            Triggered by: ${{ github.actor }}
            Reason: ${{ github.event_name }}
            Commit: ${{ github.sha }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

# ============================================================
# JOB 2: BUILD & PUSH IMAGE
# ============================================================
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: terraform-base
    outputs:
      IMAGE_TAG: ${{ steps.set-tag.outputs.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Set Image Tag
        id: set-tag
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build & Push Docker Image
        run: |
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:${{ steps.set-tag.outputs.IMAGE_TAG }}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO_NAME }}:${{ steps.set-tag.outputs.IMAGE_TAG }}
          scan-type: image
          severity: CRITICAL
          exit-code: 0
          ignore-unfixed: true
          hide-progress: true

      - name: Notify Slack - Build
        if: always()
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          message: |
            *EasyBank Docker Build & Push*
            Status: ${{ job.status }}
            Image Tag: ${{ steps.set-tag.outputs.IMAGE_TAG }}
            Triggered by: ${{ github.actor }}
            Commit: ${{ github.sha }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

# ============================================================
# JOB 3: DEPLOY TO ECS
# ============================================================
  deploy-ecs:
    name: Deploy ECS with New Image
    runs-on: ubuntu-latest
    needs: build-image
    defaults:
      run:
        working-directory: easybank-infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Deploy ECS
        run: |
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:${{ needs.build-image.outputs.IMAGE_TAG }}"
          terraform init -input=false
          terraform plan -var="easybank_image=$IMAGE_URI" -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Wait for ECS Service Stability
        run: |
          aws ecs wait services-stable \
            --cluster easybank-cluster \
            --services easybank-service

      - name: Notify Slack - Deploy
        if: always()
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          message: |
            *EasyBank ECS Deployment*
            Status: ${{ job.status }}
            Cluster: easybank-cluster
            Service: easybank-service
            Triggered by: ${{ github.actor }}
            Commit: ${{ github.sha }}
            URL: https://ofiliyoungyz.site
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}